# SwiftLint configuration — https://github.com/realm/SwiftLint
# Run `swiftlint` locally before committing; CI runs `swiftlint --strict`
# (warnings fail the build), so keep this clean.

opt_in_rules:
  - empty_count
  - first_where
  - force_unwrapping
  - redundant_nil_coalescing
  - toggle_bool

disabled_rules:
  # SwiftFormat owns trailing commas (its trailingCommas rule adds them);
  # disable SwiftLint's opposing rule so the two tools don't fight.
  - trailing_comma

# Allow 2-character design-token names (xs, md, lg); the default 3-char
# minimum is too strict for standard t-shirt-size abbreviations.
identifier_name:
  min_length:
    warning: 2
  # `t` is GRDB's conventional name for the table builder in migrations.
  excluded:
    - t

excluded:
  - .build
  - Modules/.build
  # Xcode-generated UI-test boilerplate; lint once it's replaced with real tests.
  - Repd/RepdUITests
